<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nintendo Cover Art Fetcher</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E4000F;
    --dark: #111;
    --card-bg: #1a1a1a;
    --border: #2c2c2c;
    --text: #f2f2f2;
    --muted: #777;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header { text-align: center; margin-bottom: 28px; }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--red);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    padding: 5px 14px;
    border-radius: 4px;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 8vw, 52px);
    letter-spacing: 0.04em;
    line-height: 1;
    margin-bottom: 6px;
  }
  h1 em { color: var(--red); font-style: normal; }
  .sub { color: var(--muted); font-size: 13px; }

  .search-box {
    width: 100%;
    max-width: 520px;
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .search-box input {
    flex: 1;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .search-box input:focus { border-color: var(--red); }
  .search-box input::placeholder { color: #444; }

  .search-box button {
    background: var(--red);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    padding: 13px 22px;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .search-box button:hover { opacity: 0.85; }
  .search-box button:disabled { opacity: 0.4; cursor: default; }

  #status {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    min-height: 16px;
    text-align: center;
    max-width: 520px;
    word-break: break-all;
  }
  #status.error { color: #ff6b6b; }

  #grid {
    width: 100%;
    max-width: 600px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }

  .tile {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .tile:hover { border-color: var(--red); transform: translateY(-2px); }

  .tile-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: #222;
  }

  .tile-name {
    font-size: 11px;
    font-weight: 600;
    padding: 8px 10px 4px;
    line-height: 1.3;
    color: var(--text);
  }

  .tile-save {
    display: block;
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid var(--border);
    color: var(--red);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    padding: 8px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s;
  }
  .tile-save:hover { background: rgba(228,0,15,0.08); }

  /* Modal */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal.open { display: flex; }

  .modal-box {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 360px;
    overflow: hidden;
    animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }

  #modal-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }

  .modal-info { padding: 14px 16px; }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .modal-meta { font-size: 11px; color: var(--muted); margin-bottom: 14px; }

  .modal-actions { display: flex; gap: 8px; }

  .btn-save {
    flex: 1;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 0.08em;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }

  .btn-open {
    flex: 1;
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 0.08em;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-open:hover { background: #333; }

  .btn-close {
    background: var(--border);
    color: var(--text);
    border: none;
    border-radius: 10px;
    font-size: 18px;
    width: 46px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-close:hover { background: #333; }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 40px 0;
    color: #333;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #222;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">⊕ Nintendo eShop</div>
  <h1>Cover Art <em>Fetcher</em></h1>
  <p class="sub">Search any NS / NS2 game — tap to save the square cover</p>
</header>

<div class="search-box">
  <input id="q" type="search" placeholder="e.g. Mario Kart World" autocomplete="off" />
  <button id="searchBtn" onclick="doSearch()">Search</button>
</div>

<p id="status"></p>

<div id="grid">
  <div class="empty"><p style="color:#444">Search for a game above</p></div>
</div>

<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <img id="modal-img" src="" alt="" />
    <div class="modal-info">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-actions">
        <button class="btn-save" onclick="saveImage()">⬇ Download</button>
        <button class="btn-open" onclick="openInTab()">↗ Open</button>
        <button class="btn-close" onclick="closeModal()">✕</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const ALGOLIA_APP = 'U3B6GR4UA3';
const ALGOLIA_KEY = 'c4da8be7fd29f0f5bfa42920b0a99dc7';
const INDEX = 'ncom_game_en_us';

let currentImg = null;
let currentTitle = '';

document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  setStatus('Searching…');
  document.getElementById('grid').innerHTML = '';

  try {
    const res = await fetch(
      `https://${ALGOLIA_APP}-dsn.algolia.net/1/indexes/${INDEX}/query`,
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Algolia-Application-Id': ALGOLIA_APP,
          'X-Algolia-API-Key': ALGOLIA_KEY,
        },
        body: JSON.stringify({ query: q, hitsPerPage: 12 })
      }
    );

    if (!res.ok) {
      setStatus(`API error ${res.status} — Nintendo may have updated their keys. Open browser console for details.`, true);
      console.error('Algolia response:', res.status, await res.text());
      return;
    }

    const data = await res.json();
    const hits = data.hits || [];

    console.log('Algolia hits:', hits); // debug — open browser console to inspect

    if (!hits.length) {
      setStatus('No results found.');
      document.getElementById('grid').innerHTML = '<div class="empty"><p style="color:#444">No games found</p></div>';
      return;
    }

    setStatus(`${hits.length} result${hits.length > 1 ? 's' : ''} — tap a cover to save`);
    renderGrid(hits);

  } catch (err) {
    setStatus('Search failed: ' + err.message, true);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function getSquareUrl(hit) {
  // Nintendo Cloudinary CDN — try all known image fields
  const raw =
    hit.boxArt ||
    hit.horizontalHeaderImage ||
    hit.gallery?.[0] ||
    hit.image ||
    hit.imageUrl ||
    hit.squareImage ||
    hit.thumbnailUrl ||
    '';

  if (!raw) {
    console.warn('No image field found for:', hit.title, '— available keys:', Object.keys(hit));
    return null;
  }

  // If it's already an assets.nintendo.com Cloudinary URL, force square crop
  if (raw.includes('assets.nintendo.com/image/upload/')) {
    return raw.replace(
      /\/image\/upload\/[^/]+\//,
      '/image/upload/ar_1:1,c_fill,w_600/f_auto/q_auto/'
    );
  }

  return raw;
}

function renderGrid(hits) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  hits.forEach(hit => {
    const url = getSquareUrl(hit);
    const title = hit.title || 'Unknown';
    const nsuid = hit.nsuid || '';
    const safeTitle = title.replace(/'/g, "\\'");

    const tile = document.createElement('div');
    tile.className = 'tile';

    if (url) {
      tile.innerHTML = `
        <img class="tile-img" src="${url}" alt="${title}"
          onerror="this.parentElement.querySelector('.tile-name').textContent += ' (no img)'" />
        <div class="tile-name">${title}</div>
        <button class="tile-save" onclick="openModal('${url}','${safeTitle}','${nsuid}')">
          ↗ Save
        </button>
      `;
    } else {
      // No image — show placeholder with nsuid so user knows what was found
      tile.innerHTML = `
        <div class="tile-img" style="background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:10px;color:#555;text-align:center;padding:8px;">No image<br>${nsuid}</div>
        <div class="tile-name">${title}</div>
        <button class="tile-save" style="color:#555;cursor:default">No image</button>
      `;
    }

    grid.appendChild(tile);
  });
}

function openModal(url, title, nsuid) {
  currentImg = url;
  currentTitle = title;
  document.getElementById('modal-img').src = url;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-meta').textContent = nsuid ? `NSUID: ${nsuid}` : 'Nintendo Switch';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function openInTab() {
  if (currentImg) window.open(currentImg, '_blank');
}

async function saveImage() {
  if (!currentImg) return;
  try {
    const resp = await fetch(currentImg);
    const blob = await resp.blob();
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = currentTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '_cover.jpg';
    a.click();
    URL.revokeObjectURL(blobUrl);
    showToast('Saved!');
  } catch (e) {
    // Fallback for mobile — open in new tab
    window.open(currentImg, '_blank');
    showToast('Opened in new tab — long press to save');
  }
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
