<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eShop Price Fetcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #21253a;
      --border: #2e3352;
      --accent: #6c63ff;
      --accent2: #4ade80;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #f87171;
      --gold: #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #4ade80);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 860px;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="url"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus { border-color: var(--accent); }
    input[type="url"]::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.6rem;
    }

    /* Status log */
    #status-box {
      display: none;
      margin-top: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    #status-log {
      font-size: 0.82rem;
      color: var(--muted);
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    #status-log li::before { content: '› '; color: var(--accent); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { display: none; margin-top: 1.75rem; }

    .game-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 1.25rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.65rem 1rem;
      text-align: left;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    thead th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td { padding: 0.8rem 1rem; vertical-align: middle; }

    .rank-badge {
      background: var(--surface2);
      border-radius: 6px;
      color: var(--muted);
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      min-width: 28px;
      padding: 2px 6px;
      text-align: center;
    }

    .rank-badge.gold   { background: rgba(251,191,36,.15); color: var(--gold); }
    .rank-badge.silver { background: rgba(148,163,184,.12); color: #94a3b8; }
    .rank-badge.bronze { background: rgba(180,123,80,.15); color: #cd7f50; }

    .country-cell { display: flex; align-items: center; gap: 0.5rem; }
    .flag { font-size: 1.2rem; line-height: 1; }
    .country-name { font-weight: 500; }
    .country-link { color: inherit; text-decoration: none; }
    .country-link:hover { color: var(--accent); text-decoration: underline; }

    .partial-banner {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(108,99,255,.08);
      border: 1px solid rgba(108,99,255,.25);
      border-radius: 8px;
      color: #a5b4fc;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      padding: 0.6rem 1rem;
    }
    .partial-banner .spinner { border-top-color: #a5b4fc; }
    .currency-tag {
      background: var(--surface2);
      border-radius: 4px;
      color: var(--muted);
      font-size: 0.7rem;
      padding: 1px 5px;
    }

    .original-price { color: var(--muted); }

    .gift-card {
      background: rgba(108,99,255,.12);
      border-radius: 6px;
      color: #a5b4fc;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .gift-card.exact {
      background: rgba(100,116,139,.1);
      color: var(--muted);
    }

    .sgd-price {
      color: var(--accent2);
      font-size: 1rem;
      font-weight: 700;
      text-align: right;
    }

    .na { color: var(--muted); font-style: italic; }

    /* Rates footer */
    .rates-footer {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .rate-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 0.75rem;
      padding: 3px 10px;
    }

    .rate-source {
      color: var(--muted);
      font-size: 0.75rem;
      margin-left: auto;
    }

    .error-box {
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.3);
      border-radius: 10px;
      color: var(--danger);
      font-size: 0.88rem;
      margin-top: 1rem;
      padding: 0.9rem 1.1rem;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>eShop Price Fetcher</h1>
    <p>Compare Nintendo eShop prices worldwide — converted to SGD with gift card rounding</p>
  </header>

  <div class="card">
    <div class="input-row">
      <input
        type="url"
        id="url-input"
        placeholder="https://eshop-prices.com/games/378-… or https://www.nintendo.com/us/store/products/…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="fetch-btn" onclick="fetchPrices()">Fetch Prices</button>
    </div>
    <p class="hint">Paste an eshop-prices.com, dekudeals.com, or nintendo.com/store game link</p>

    <div id="error-box" class="error-box"></div>

    <div id="status-box">
      <ul id="status-log"></ul>
    </div>

    <div id="results">
      <div id="partial-banner" class="partial-banner" style="display:none">
        <span class="spinner"></span>
        Still searching for JP / HK / SG prices…
      </div>
      <div class="game-title" id="game-title"></div>
      <div class="meta" id="meta"></div>
      <table>
        <thead>
          <tr>
            <th style="width:48px">#</th>
            <th>Country</th>
            <th>Listed Price</th>
            <th>Gift Card Spend</th>
            <th style="text-align:right">Cost in SGD</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <div class="rates-footer" id="rates-footer"></div>
    </div>
  </div>

  <script>
    const DENOMS = {
      USD: [5, 10], SGD: null, HKD: null, BRL: [30, 50],
      JPY: [500, 1000], CAD: [10, 20, 25], MXN: [100, 200, 350], AUD: [15],
    };

    const FLAGS = {
      'United States': '🇺🇸', 'Singapore': '🇸🇬', 'Hong Kong': '🇭🇰',
      'Brazil': '🇧🇷', 'Japan': '🇯🇵', 'Canada': '🇨🇦', 'Mexico': '🇲🇽', 'Australia': '🇦🇺',
    };

    let controller = null;

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }

    function hideError() {
      document.getElementById('error-box').style.display = 'none';
    }

    function addStatus(msg) {
      const log = document.getElementById('status-log');
      const li = document.createElement('li');
      li.textContent = msg;
      log.appendChild(li);
      log.scrollTop = log.scrollHeight;
    }

    function rankClass(i) {
      if (i === 0) return 'gold';
      if (i === 1) return 'silver';
      if (i === 2) return 'bronze';
      return '';
    }

    function renderResults(data, isPartial = false) {
      document.getElementById('partial-banner').style.display = isPartial ? 'flex' : 'none';
      document.getElementById('game-title').textContent = data.gameName;
      document.getElementById('meta').textContent =
        `Exchange rate source: ${data.rateSource} · Prices converted to SGD`;

      const tbody = document.getElementById('results-body');
      tbody.innerHTML = '';

      let rank = 0;
      data.results.forEach((r, i) => {
        const hasPrice = r.sgdPrice !== null;
        if (hasPrice) rank++;

        const tr = document.createElement('tr');

        // Rank
        const rankTd = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'rank-badge' + (hasPrice ? ' ' + rankClass(rank - 1) : '');
        badge.textContent = hasPrice ? `#${rank}` : '—';
        rankTd.appendChild(badge);
        tr.appendChild(rankTd);

        // Country
        const countryTd = document.createElement('td');
        const nameHtml = r.eshopUrl
          ? `<a class="country-name country-link" href="${r.eshopUrl}" target="_blank" rel="noopener">${r.country}</a>`
          : `<span class="country-name">${r.country}</span>`;
        countryTd.innerHTML = `
          <div class="country-cell">
            <span class="flag">${FLAGS[r.country] || ''}</span>
            ${nameHtml}
            <span class="currency-tag">${r.currency}</span>
          </div>`;
        tr.appendChild(countryTd);

        // Listed price
        const priceTd = document.createElement('td');
        priceTd.className = 'original-price';
        priceTd.textContent = r.rawPrice || 'Not Available';
        tr.appendChild(priceTd);

        // Gift card spend
        const gcTd = document.createElement('td');
        if (!r.rawPrice) {
          gcTd.innerHTML = '<span class="na">Not Available</span>';
        } else if (r.effectiveAmount === 0) {
          gcTd.innerHTML = '<span class="gift-card exact">Free</span>';
        } else if (DENOMS[r.currency]) {
          const formatted = Number.isInteger(r.effectiveAmount)
            ? r.effectiveAmount.toLocaleString()
            : r.effectiveAmount.toFixed(2);
          gcTd.innerHTML = `<span class="gift-card">${r.currency} ${formatted}</span>`;
        } else {
          gcTd.innerHTML = `<span class="gift-card exact">Exact price</span>`;
        }
        tr.appendChild(gcTd);

        // SGD price
        const sgdTd = document.createElement('td');
        sgdTd.className = 'sgd-price';
        if (r.sgdPrice === 0) {
          sgdTd.innerHTML = '<span class="gift-card exact">Free</span>';
        } else if (r.sgdPrice !== null) {
          sgdTd.textContent = `S$${r.sgdPrice.toFixed(2)}`;
        } else {
          sgdTd.innerHTML = '<span class="na">Not Available</span>';
        }
        tr.appendChild(sgdTd);

        tbody.appendChild(tr);
      });

      // Rates footer
      const footer = document.getElementById('rates-footer');
      footer.innerHTML = '';
      const SUPPLY_CURRENCIES = ['USD', 'BRL', 'CAD', 'MXN', 'AUD'];
      for (const [cur, rate] of Object.entries(data.sgdRates)) {
        if (cur === 'SGD' || cur === 'CNY') continue;
        const chip = document.createElement('span');
        chip.className = 'rate-chip';
        if (SUPPLY_CURRENCIES.includes(cur) && data.supplyRates?.[cur] != null && data.cnyToSgd != null) {
          const effectiveSgd = data.supplyRates[cur] * data.cnyToSgd;
          chip.textContent = `1 ${cur} = ${data.supplyRates[cur]} CNY (≈ S$${effectiveSgd.toFixed(4)})`;
          chip.title = 'Supply rate (gift card cost in CNY)';
          chip.style.borderColor = 'rgba(108,99,255,.4)';
        } else {
          chip.textContent = `1 ${cur} = ${rate.toFixed(4)} SGD`;
        }
        footer.appendChild(chip);
      }
      if (data.cnyToSgd != null) {
        const cnyChip = document.createElement('span');
        cnyChip.className = 'rate-chip';
        cnyChip.textContent = `1 CNY = ${data.cnyToSgd.toFixed(4)} SGD`;
        footer.appendChild(cnyChip);
      }
      const src = document.createElement('span');
      src.className = 'rate-source';
      src.textContent = data.rateSource;
      footer.appendChild(src);

      document.getElementById('results').style.display = 'block';
    }

    async function fetchPrices() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) { showError('Please enter a URL.'); return; }
      if (!url.includes('eshop-prices.com') && !url.includes('dekudeals.com') && !url.includes('nintendo.com')) {
        showError('Please enter an eshop-prices.com, dekudeals.com, or nintendo.com store URL.');
        return;
      }

      hideError();
      document.getElementById('results').style.display = 'none';
      document.getElementById('status-box').style.display = 'block';
      document.getElementById('status-log').innerHTML = '';
      document.getElementById('fetch-btn').disabled = true;

      if (controller) controller.abort();
      controller = new AbortController();

      try {
        const res = await fetch(`/api/fetch?url=${encodeURIComponent(url)}`, {
          signal: controller.signal,
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const msg = JSON.parse(line.slice(6));
            if (msg.type === 'status') {
              addStatus(msg.data);
            } else if (msg.type === 'partial') {
              document.getElementById('status-box').style.display = 'none';
              renderResults(msg.data, true);
            } else if (msg.type === 'result') {
              document.getElementById('status-box').style.display = 'none';
              renderResults(msg.data, false);
            } else if (msg.type === 'error') {
              showError('Error: ' + msg.data);
              document.getElementById('status-box').style.display = 'none';
            }
          }
        }
      } catch (err) {
        if (err.name !== 'AbortError') showError(err.message);
      } finally {
        document.getElementById('fetch-btn').disabled = false;
      }
    }

    document.getElementById('url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fetchPrices();
    });
  </script>
</body>
</html>
